services:
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'

  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: guardrails
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
